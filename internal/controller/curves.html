<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Node Latency Watch - 曲线对比</title>
  <style>
    :root{
      color-scheme:dark;
      --bg:#081018;--panel:rgba(14,27,39,.9);--panel2:rgba(18,32,45,.94);
      --line:rgba(132,162,184,.18);--line2:rgba(132,162,184,.34);
      --text:#eef7fb;--muted:#8ca0ad;--faint:#617784;
      --green:#20d6a2;--blue:#69b7ff;--yellow:#f4c95d;--red:#ff6b6b;--pink:#ee4f9a;
      --shadow:0 28px 80px rgba(0,0,0,.42);
      --mono:"Cascadia Code","SFMono-Regular",Consolas,monospace;
      --sans:"Segoe UI","Microsoft YaHei UI","PingFang SC",Arial,sans-serif;
    }
    *{box-sizing:border-box}
    html{min-height:100%;background:var(--bg)}
    body{
      margin:0;min-height:100vh;color:var(--text);font-family:var(--sans);overflow-x:hidden;letter-spacing:0;
      background:
        radial-gradient(circle at 16% 8%,rgba(32,214,162,.18),transparent 32rem),
        radial-gradient(circle at 78% 18%,rgba(238,79,154,.13),transparent 34rem),
        linear-gradient(135deg,#071016 0%,#0b1620 46%,#101821 100%);
    }
    body:before{
      content:"";position:fixed;inset:0;pointer-events:none;
      background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);
      background-size:48px 48px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.86),rgba(0,0,0,.12));
    }
    button,input{font:inherit}
    button{border:0;color:inherit}
    a{color:inherit}
    .shell{position:relative;z-index:1;width:min(1360px,calc(100vw - 40px));margin:0 auto;padding:28px 0 36px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:14px;min-width:0}
    .brand-mark{width:42px;height:42px;border-radius:15px;display:grid;place-items:center;color:#04120e;font-weight:900;background:linear-gradient(135deg,#20d6a2,#7be7ff);box-shadow:0 16px 42px rgba(32,214,162,.25)}
    .eyebrow{margin:0 0 3px;color:var(--muted);font-size:12px;text-transform:uppercase}
    h1{margin:0;font-size:20px;letter-spacing:0}
    .top-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .pill,.btn{min-height:40px;padding:0 16px;border:1px solid var(--line);border-radius:999px;backdrop-filter:blur(16px);transition:transform .18s ease,border-color .18s ease,background .18s ease,opacity .18s ease}
    .pill{display:inline-flex;align-items:center;gap:10px;color:#b7c6cf;font-size:13px;font-weight:650;background:rgba(8,16,24,.58);box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
    .pill:before{content:"";width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 18px var(--green)}
    .btn{display:inline-flex;align-items:center;text-decoration:none;cursor:pointer;background:rgba(255,255,255,.045);font-weight:760}
    .btn:hover{transform:translateY(-1px);border-color:var(--line2)}
    .btn-primary{color:#04120e;background:linear-gradient(135deg,#20d6a2,#65e9d6);border-color:rgba(101,233,214,.34);box-shadow:0 18px 42px rgba(32,214,162,.2)}
    .rails{display:grid;gap:10px;margin-bottom:14px}
    .rail{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .chip{min-height:34px;padding:0 14px;border:1px solid rgba(132,162,184,.16);border-radius:999px;background:rgba(255,255,255,.04);color:#95a9b6;font-size:13px;font-weight:760;cursor:pointer;transition:.18s ease}
    .chip:hover{transform:translateY(-1px);color:#d7e5ec}
    .chip.active{border-color:rgba(32,214,162,.42);background:rgba(32,214,162,.13);color:#dffcf2}
    .panel{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:26px;background:linear-gradient(145deg,rgba(15,28,39,.92),rgba(8,16,24,.74));box-shadow:var(--shadow);backdrop-filter:blur(22px)}
    .board{padding:22px}
    .board-head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:16px}
    .section-kicker{color:var(--muted);font-size:12px;margin-bottom:7px}
    .board-title{margin:0;font-size:24px;line-height:1.15}
    .board-sub{margin-top:8px;color:var(--muted);font-size:13px}
    .summary-strip{display:grid;grid-template-columns:repeat(4,minmax(94px,1fr));gap:10px;min-width:min(520px,100%)}
    .summary-item{border:1px solid rgba(132,162,184,.13);border-radius:14px;padding:10px 12px;background:rgba(255,255,255,.035)}
    .summary-item span{display:block;color:#718592;font-size:11px}
    .summary-item strong{display:block;margin-top:5px;font-family:var(--mono);font-size:18px}
    .tools{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;padding:12px;border:1px solid rgba(132,162,184,.14);border-radius:16px;background:rgba(255,255,255,.03)}
    .tool-group{display:inline-flex;align-items:center;gap:6px;padding:4px;border:1px solid rgba(132,162,184,.13);border-radius:999px;background:rgba(5,13,20,.44)}
    .tool-btn{height:30px;padding:0 11px;border-radius:999px;background:transparent;color:#8fa4b2;font-size:12px;font-weight:850;cursor:pointer}
    .tool-btn.active{background:rgba(32,214,162,.16);color:#dffcf2;box-shadow:inset 0 0 0 1px rgba(32,214,162,.18)}
    .tool-action{height:34px;padding:0 12px;border:1px solid rgba(132,162,184,.18);border-radius:10px;background:rgba(255,255,255,.045);font-size:12px;font-weight:850;cursor:pointer}
    .tool-action.primary{border-color:rgba(32,214,162,.32);background:rgba(32,214,162,.12);color:#dffcf2}
    .search{height:34px;min-width:210px;border:1px solid rgba(132,162,184,.16);border-radius:999px;background:#071018;color:#dceaf0;padding:0 13px;font:12px var(--mono)}
    .search:focus{outline:none;border-color:rgba(105,183,255,.45);box-shadow:0 0 0 3px rgba(105,183,255,.1)}
    .node-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));max-height:390px;overflow:auto;border:1px solid rgba(132,162,184,.14);border-radius:18px;background:rgba(255,255,255,.025);margin-bottom:18px}
    .node-grid::-webkit-scrollbar{width:9px;height:9px}.node-grid::-webkit-scrollbar-thumb{border-radius:999px;background:rgba(132,162,184,.24)}.node-grid::-webkit-scrollbar-track{background:rgba(255,255,255,.025)}
    .node-tile{min-height:116px;padding:15px 16px;border-right:1px solid rgba(132,162,184,.12);border-bottom:1px solid rgba(132,162,184,.12);background:rgba(255,255,255,.018);text-align:left;cursor:pointer;transition:.18s ease}
    .node-tile:nth-child(4n){border-right:0}
    .node-tile:hover{background:rgba(105,183,255,.06)}
    .node-tile.active{background:linear-gradient(145deg,rgba(32,214,162,.14),rgba(105,183,255,.055));box-shadow:inset 0 0 0 1px rgba(32,214,162,.28)}
    .node-name{display:flex;align-items:center;gap:7px;min-width:0;color:#dceaf2;font-size:13px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .node-provider{margin-top:6px;color:#728692;font-size:11px;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .node-value{margin-top:10px;font-family:var(--mono);font-size:25px;font-weight:900;line-height:1}
    .node-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px;color:#9badb8;font-size:12px;font-family:var(--mono)}
    .node-meta .bad{color:#ffc7c7}.node-meta .warn{color:#f4d98f}
    .empty{color:var(--muted);padding:28px;text-align:center;border:1px dashed rgba(132,162,184,.22);border-radius:18px;background:rgba(255,255,255,.025)}
    .chart-wrap{position:relative;border:1px solid rgba(132,162,184,.14);border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.018));overflow:hidden}
    .chart-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;border-bottom:1px solid rgba(132,162,184,.12);color:#8da3b0;font-size:12px}
    .chart{height:430px}
    .chart svg{width:100%;height:100%;display:block}
    .axis{stroke:rgba(132,162,184,.16);stroke-width:1}
    .cap-line{stroke:rgba(244,201,93,.52);stroke-width:1;stroke-dasharray:4 6}
    .line{fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
    .point{stroke:#081018;stroke-width:.8}
    .legend{display:flex;gap:10px;flex-wrap:wrap;padding:12px 16px 16px;color:#9aaeba;font-size:12px}
    .legend-item{display:inline-flex;align-items:center;gap:6px;min-width:0}
    .legend-dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
    .toast{position:fixed;right:18px;bottom:18px;z-index:20;padding:12px 15px;border:1px solid rgba(32,214,162,.45);border-radius:12px;background:#0b1620;color:var(--text);box-shadow:0 18px 50px rgba(0,0,0,.35);opacity:0;transform:translateY(8px);transition:.18s ease;pointer-events:none}
    .toast.show{opacity:1;transform:translateY(0)}
    @media(max-width:1100px){
      .board-head{display:grid}.summary-strip{min-width:0}.node-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.node-tile:nth-child(4n){border-right:1px solid rgba(132,162,184,.12)}.node-tile:nth-child(3n){border-right:0}
    }
    @media(max-width:760px){
      body{overflow-x:hidden}.shell{width:100%;padding:10px 8px 24px}.topbar{display:grid;gap:10px;margin-bottom:12px}
      .brand{gap:10px}.brand-mark{width:34px;height:34px;border-radius:12px;font-size:12px}.eyebrow{font-size:10px}h1{font-size:16px;line-height:1.25}
      .top-actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.top-actions .pill{grid-column:1/-1;justify-content:center;min-height:34px;font-size:12px}.top-actions .btn{justify-content:center;min-height:36px;padding:0 10px;font-size:12px}
      .rail{flex-wrap:nowrap;overflow-x:auto;margin:0 -8px;padding:0 8px 4px;-webkit-overflow-scrolling:touch}.rail::-webkit-scrollbar{display:none}.chip{flex:0 0 auto}
      .panel{border-radius:18px}.board{padding:14px}.board-title{font-size:20px}.summary-strip{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
      .tools{display:grid;grid-template-columns:1fr;align-items:stretch;gap:8px}.tool-group{justify-content:center}.tool-action,.search{width:100%;height:38px}
      .node-grid{display:grid;grid-template-columns:1fr;max-height:none;overflow:visible;border:0;border-radius:0;background:transparent;gap:10px}.node-tile,.node-tile:nth-child(3n),.node-tile:nth-child(4n){border:1px solid rgba(132,162,184,.14);border-radius:16px;background:rgba(255,255,255,.035)}
      .chart{height:320px}.chart-toolbar{display:grid}.legend{max-height:128px;overflow:auto}.toast{left:8px;right:8px;bottom:10px;text-align:center}
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">NL</div>
        <div>
          <p class="eyebrow">Node Latency Watch</p>
          <h1>全节点曲线对比</h1>
        </div>
      </div>
      <div class="top-actions">
        <div class="pill"><span id="liveText">等待刷新</span></div>
        <a class="btn" href="/">首页数据</a>
        <button class="btn btn-primary" id="reloadBtn">立即刷新</button>
      </div>
    </div>

    <div class="rails">
      <div class="rail" id="providerRail"></div>
      <div class="rail" id="agentRail"></div>
    </div>

    <section class="panel board">
      <div class="board-head">
        <div>
          <div class="section-kicker">CURVE WORKBENCH</div>
          <h2 class="board-title" id="scopeTitle">曲线对比</h2>
          <div class="board-sub" id="scopeSub">选择节点后查看多运营商曲线。</div>
        </div>
        <div class="summary-strip">
          <div class="summary-item"><span>可选节点</span><strong id="visibleCount">0</strong></div>
          <div class="summary-item"><span>已选节点</span><strong id="selectedCount">0</strong></div>
          <div class="summary-item"><span>曲线条数</span><strong id="seriesCount">0</strong></div>
          <div class="summary-item"><span>时间范围</span><strong id="hoursCount">24h</strong></div>
        </div>
      </div>

      <div class="tools">
        <div class="tool-group" id="rangeTools">
          <button class="tool-btn active" data-hours="24">1 天</button>
          <button class="tool-btn" data-hours="168">7 天</button>
          <button class="tool-btn" data-hours="720">30 天</button>
        </div>
        <div class="tool-group" id="metricTools">
          <button class="tool-btn active" data-metric="rtt">RTT</button>
          <button class="tool-btn" data-metric="http">HTTP</button>
          <button class="tool-btn" data-metric="jitter">抖动</button>
          <button class="tool-btn" data-metric="loss">丢包</button>
        </div>
        <button class="tool-action primary" id="despikeBtn">消峰 开</button>
        <button class="tool-action" id="selectDefaultBtn">精选 12 个</button>
        <button class="tool-action" id="selectAllBtn">全选当前</button>
        <button class="tool-action" id="clearBtn">清空</button>
        <input class="search" id="searchInput" placeholder="搜索节点 / 机场 / 协议">
      </div>

      <div id="nodeGrid" class="node-grid"></div>

      <div class="chart-wrap">
        <div class="chart-toolbar">
          <div id="chartHint">等待选择节点。</div>
          <div id="chartFreshness">-</div>
        </div>
        <div class="chart" id="curveChart"><div class="empty">选择节点后加载曲线。</div></div>
        <div class="legend" id="curveLegend"></div>
      </div>
    </section>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const carriers=[['telecom','中国电信'],['unicom','中国联通'],['mobile','中国移动'],['unknown','未知线路']];
    const metricInfo={rtt:{label:'RTT',unit:'ms'},http:{label:'HTTP',unit:'ms'},jitter:{label:'抖动',unit:'ms'},loss:{label:'丢包',unit:'%'}};
    const palette=['#2f7dff','#ee4f9a','#ff9f2e','#b85cff','#20d6a2','#40d7d3','#5a8dee','#7447d8','#d346a4','#69b7ff','#f4c95d','#ff6b6b','#74d680','#c087ff','#ff7ec2','#5ce1ff'];
    const $=id=>document.getElementById(id);
    let adminConfig=null, lastStatus=null, overview=[], agents=[], providers=[], selectedProvider='all', selectedAgent='all', metric='rtt', hours=24, despike=true, keyword='', selectionTouched=false;
    const selectedNodes=new Set(), sampleCache=new Map(), loadingNodes=new Set();
    function escapeHTML(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
    function toast(text,bad=false){const el=$('toast');el.textContent=text;el.style.borderColor=bad?'rgba(255,107,107,.5)':'rgba(32,214,162,.45)';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2400)}
    async function apiJSON(url,options){const resp=await fetch(url,options);if(!resp.ok)throw new Error(await resp.text()||resp.statusText);const data=await resp.json();if(data&&data.error)throw new Error(data.error);return data}
    function carrierLabel(value){const found=carriers.find(c=>c[0]===value);return found?found[1]:(value||'未知线路')}
    function agentLabel(agent){return agent?(agent.name||agent.id||'未知机子'):'全部机子'}
    function activeAgent(){return selectedAgent==='all'?null:agents.find(agent=>agent.id===selectedAgent)}
    function activeAgentLabel(){return selectedAgent==='all'?'全部机子':agentLabel(activeAgent())}
    function providerKeyForRow(row){const n=row&&row.node?row.node:{};return n.providerId||n.provider||'unknown'}
    function providerNameForRow(row){const n=row&&row.node?row.node:{};return n.provider||n.providerId||'未知机场'}
    function providerLabel(value){const found=providers.find(provider=>provider.id===value);return found?found.name:value}
    function cleanNodeName(value){const raw=String(value||'').trim();return raw.replace(/^(?:[\u{1F1E6}-\u{1F1FF}]{2}\s*)+/u,'').trim()||raw}
    function sampleCarrierKey(sample){return sample.carrier||sample.agentId||'unknown'}
    function sampleCarrierName(sample){return sample.carrierLabel||carrierLabel(sample.carrier)||sample.agentName||sampleCarrierKey(sample)}
    function sampleValue(sample,key=metric){
      if(!sample)return null;
      if(key==='loss')return Number(sample.lossRate||0);
      if(!sample.success)return null;
      if(key==='rtt')return Number(sample.tcpMs||0)||null;
      if(key==='http')return Number(sample.httpMs||0)||null;
      if(key==='jitter')return Number(sample.rttStdDevMs||0);
      return null;
    }
    function fmtMetric(value,key=metric){
      if(value===null||value===undefined||!Number.isFinite(value))return'超时';
      const unit=metricInfo[key].unit;
      return (unit==='%'?value.toFixed(0):value.toFixed(value>=100?0:1))+unit;
    }
    function sampleScore(sample){
      if(!sample)return Infinity;
      const failed=sample.success?0:1000000;
      return failed+Number(sample.lossRate||0)*1000+Number(sample.tcpMs||0)*2+Number(sample.httpMs||0)+Number(sample.rttStdDevMs||0)*5;
    }
    function bestSample(list){return (list||[]).slice().sort((a,b)=>sampleScore(a)-sampleScore(b))[0]}
    function visibleAgents(){return (agents||[]).filter(agent=>agent.configured&&agent.lastSeen&&!String(agent.lastSeen).startsWith('0001'))}
    function scopedRows(){
      const text=keyword.trim().toLowerCase();
      return (overview||[]).map(row=>selectedAgent==='all'?row:{...row,latest:(row.latest||[]).filter(sample=>sample.agentId===selectedAgent)})
        .filter(row=>selectedProvider==='all'||providerKeyForRow(row)===selectedProvider)
        .filter(row=>(row.latest||[]).length)
        .filter(row=>{
          if(!text)return true;
          const n=row.node||{};
          return [n.name,n.provider,n.providerId,n.protocol,n.server].filter(Boolean).join(' ').toLowerCase().includes(text);
        });
    }
    function buildProviders(cfg,rows){
      const seen=new Set(), out=[];
      (cfg.providers||[]).forEach(provider=>{const id=provider.id||provider.name;if(!id||seen.has(id))return;seen.add(id);out.push({id,name:provider.name||provider.id})});
      (rows||[]).forEach(row=>{const id=providerKeyForRow(row);if(!id||seen.has(id))return;seen.add(id);out.push({id,name:providerNameForRow(row)})});
      return out;
    }
    function selectDefault(rows){
      selectedNodes.clear();
      rows.slice(0,12).forEach(row=>selectedNodes.add(row.node.id));
      selectionTouched=false;
    }
    function ensureSelection(rows){
      const valid=new Set(rows.map(row=>row.node.id));
      Array.from(selectedNodes).forEach(id=>{if(!valid.has(id))selectedNodes.delete(id)});
      if(!selectedNodes.size&&!selectionTouched)selectDefault(rows);
    }
    function limitForHours(){return hours>=720?8000:hours>=168?5000:2400}
    function cacheKey(nodeID){return nodeID+':'+hours}
    async function loadSamplesForSelected(force=false){
      const ids=Array.from(selectedNodes);
      const missing=ids.filter(id=>force||!sampleCache.has(cacheKey(id)));
      if(!missing.length){renderChart();return}
      missing.forEach(id=>loadingNodes.add(id));
      renderChart();
      try{
        await Promise.all(missing.map(async id=>{
          const q=new URLSearchParams({node_id:id,hours:String(hours),limit:String(limitForHours())});
          const data=await apiJSON('/api/samples?'+q.toString(),{cache:'no-store'});
          sampleCache.set(cacheKey(id),Array.isArray(data)?data:[]);
        }));
      }finally{
        missing.forEach(id=>loadingNodes.delete(id));
        renderChart();
      }
    }
    async function load(forceSamples=false){
      const [status,overviewData,cfg,agentData]=await Promise.all([
        apiJSON('/api/status',{cache:'no-store'}),
        apiJSON('/api/overview',{cache:'no-store'}),
        apiJSON('/api/admin/config',{cache:'no-store'}),
        apiJSON('/api/admin/agents',{cache:'no-store'})
      ]);
      lastStatus=status;
      adminConfig=cfg;
      overview=Array.isArray(overviewData)?overviewData:[];
      agents=Array.isArray(agentData)?agentData:[];
      providers=buildProviders(cfg,overview);
      if(selectedProvider!=='all'&&!providers.some(provider=>provider.id===selectedProvider))selectedProvider='all';
      if(selectedAgent!=='all'&&!visibleAgents().some(agent=>agent.id===selectedAgent))selectedAgent='all';
      const rows=scopedRows();
      ensureSelection(rows);
      renderAll(status,rows);
      await loadSamplesForSelected(forceSamples);
    }
    function renderAll(status=lastStatus||{},rows=scopedRows()){
      renderRails();
      renderTools();
      renderSummary(status,rows);
      renderNodeGrid(rows);
      renderChart();
      $('liveText').textContent='最后刷新 '+new Date().toLocaleTimeString();
    }
    function renderRails(){
      $('providerRail').innerHTML='<button class="chip '+(selectedProvider==='all'?'active':'')+'" data-provider="all">全部机场</button>'+providers.map(provider=>'<button class="chip '+(selectedProvider===provider.id?'active':'')+'" data-provider="'+escapeHTML(provider.id)+'">'+escapeHTML(provider.name)+'</button>').join('');
      document.querySelectorAll('[data-provider]').forEach(btn=>btn.addEventListener('click',()=>{selectedProvider=btn.dataset.provider;selectionTouched=false;renderAfterScopeChange()}));
      const list=visibleAgents();
      $('agentRail').innerHTML='<button class="chip '+(selectedAgent==='all'?'active':'')+'" data-agent="all">全部机子</button>'+list.map(agent=>'<button class="chip '+(selectedAgent===agent.id?'active':'')+'" data-agent="'+escapeHTML(agent.id)+'">'+escapeHTML(agentLabel(agent))+'</button>').join('');
      document.querySelectorAll('[data-agent]').forEach(btn=>btn.addEventListener('click',()=>{selectedAgent=btn.dataset.agent;selectionTouched=false;renderAfterScopeChange()}));
    }
    function renderTools(){
      document.querySelectorAll('[data-hours]').forEach(btn=>btn.classList.toggle('active',Number(btn.dataset.hours)===hours));
      document.querySelectorAll('[data-metric]').forEach(btn=>btn.classList.toggle('active',btn.dataset.metric===metric));
      $('despikeBtn').textContent='消峰 '+(despike?'开':'关');
      $('despikeBtn').classList.toggle('primary',despike);
      $('searchInput').value=keyword;
    }
    function renderAfterScopeChange(){
      const rows=scopedRows();
      ensureSelection(rows);
      renderAll(lastStatus||{},rows);
      loadSamplesForSelected().catch(e=>toast(e.message,true));
    }
    function renderSummary(status,rows){
      const selected=Array.from(selectedNodes).filter(id=>rows.some(row=>row.node.id===id)).length;
      $('scopeTitle').textContent=(selectedProvider==='all'?'全部机场':providerLabel(selectedProvider));
      $('scopeSub').textContent=activeAgentLabel()+' · '+metricInfo[metric].label+' · 点击节点卡片显示或关闭曲线';
      $('visibleCount').textContent=rows.length;
      $('selectedCount').textContent=selected;
      $('hoursCount').textContent=hours>=720?'30d':hours>=168?'7d':'24h';
      $('chartFreshness').textContent=status.lastRefresh?'订阅刷新 '+new Date(status.lastRefresh).toLocaleString():'-';
    }
    function renderNodeGrid(rows){
      if(!rows.length){$('nodeGrid').innerHTML='<div class="empty" style="grid-column:1/-1">当前筛选下没有可用节点。</div>';return}
      $('nodeGrid').innerHTML=rows.map(row=>{
        const sample=bestSample(row.latest||[]), value=sampleValue(sample), n=row.node||{}, active=selectedNodes.has(n.id);
        const loss=sample?Number(sample.lossRate||0):0, jitter=sample?Number(sample.rttStdDevMs||0):0;
        const valueClass=!sample||!sample.success?'bad':value>800?'bad':value>300?'warn':'';
        return '<button class="node-tile '+(active?'active':'')+'" data-node="'+escapeHTML(n.id)+'">'+
          '<div class="node-name">'+escapeHTML(cleanNodeName(n.name||n.id))+'</div>'+
          '<div class="node-provider">'+escapeHTML(n.provider||n.providerId||'-')+' · '+escapeHTML(n.protocol||'-')+'</div>'+
          '<div class="node-value '+valueClass+'">'+escapeHTML(fmtMetric(value))+'</div>'+
          '<div class="node-meta"><span>'+escapeHTML(sample?sampleCarrierName(sample):'-')+'</span><span class="'+(loss>0?'warn':'')+'">丢包 '+loss.toFixed(0)+'%</span><span>抖动 '+jitter.toFixed(1)+'</span></div>'+
        '</button>';
      }).join('');
      document.querySelectorAll('[data-node]').forEach(btn=>btn.addEventListener('click',()=>{
        const id=btn.dataset.node;
        if(selectedNodes.has(id))selectedNodes.delete(id);else selectedNodes.add(id);
        selectionTouched=true;
        renderAll(lastStatus||{},rows);
        loadSamplesForSelected().catch(e=>toast(e.message,true));
      }));
    }
    function selectedRows(){
      const rows=scopedRows(), byID=new Map(rows.map(row=>[row.node.id,row]));
      return Array.from(selectedNodes).map(id=>byID.get(id)).filter(Boolean);
    }
    function seriesForChart(){
      const out=[];
      selectedRows().forEach(row=>{
        const samples=(sampleCache.get(cacheKey(row.node.id))||[]).filter(sample=>selectedAgent==='all'||sample.agentId===selectedAgent);
        const groups=new Map();
        samples.forEach(sample=>{const key=sampleCarrierKey(sample);if(!groups.has(key))groups.set(key,[]);groups.get(key).push(sample)});
        groups.forEach((list,key)=>{
          const records=list.map(sample=>({time:new Date(sample.time).getTime(),value:sampleValue(sample),success:sample.success})).filter(item=>Number.isFinite(item.time)).sort((a,b)=>a.time-b.time);
          out.push({key:row.node.id+'|'+key,node:row.node,label:cleanNodeName(row.node.name)+' · '+sampleCarrierName(list[0]||{carrier:key}),records});
        });
      });
      return out;
    }
    function percentileFloor(sortedValues,ratio){if(!sortedValues.length)return null;const index=Math.max(0,Math.min(sortedValues.length-1,Math.floor((sortedValues.length-1)*ratio)));return sortedValues[index]}
    function renderScale(values){
      const maxValue=Math.max(...values);
      if(metric==='loss')return{maxY:Math.max(100,maxValue),cap:null,clipped:false};
      const fullMaxY=Math.max(10,Math.ceil(maxValue*1.18));
      if(!despike||values.length<3)return{maxY:fullMaxY,cap:null,clipped:false};
      const sorted=values.filter(value=>Number.isFinite(value)&&value>=0).sort((a,b)=>a-b);
      const median=percentileFloor(sorted,.5)||0, p90=percentileFloor(sorted,.9)||maxValue, p95=percentileFloor(sorted,.95)||p90;
      const robustHigh=values.length<20?p90:Math.min(p95,Math.max(p90,median*2.4));
      const cap=Math.max(10,robustHigh*1.18,median*1.8), gap=Math.max(35,median*.55,p90*.25);
      if(maxValue<=cap*1.35||maxValue-cap<=gap)return{maxY:fullMaxY,cap:null,clipped:false};
      return{maxY:Math.max(10,Math.ceil(cap*1.18)),cap,clipped:true};
    }
    function downsample(records,maxPoints){
      const points=records.filter(r=>r.value!==null&&Number.isFinite(r.value));
      if(points.length<=maxPoints)return points;
      const out=[];
      for(let i=0;i<maxPoints;i++){
        const start=Math.floor(i*points.length/maxPoints), end=Math.max(start+1,Math.floor((i+1)*points.length/maxPoints)), bucket=points.slice(start,end);
        if(i===0){out.push(points[0]);continue}
        if(i===maxPoints-1){out.push(points[points.length-1]);continue}
        out.push({time:bucket.reduce((sum,item)=>sum+item.time,0)/bucket.length,value:bucket.reduce((sum,item)=>sum+item.value,0)/bucket.length});
      }
      return out;
    }
    function linePath(points){return points.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')}
    function renderChart(){
      const rows=selectedRows(), loading=loadingNodes.size>0, series=seriesForChart(), chartEl=$('curveChart'), chartWidth=Math.round(chartEl.clientWidth||1100), compact=chartWidth<640;
      $('selectedCount').textContent=rows.length;
      $('seriesCount').textContent=series.length;
      $('chartHint').textContent=(loading?'正在加载...':'已加载')+' · '+rows.length+' 个节点 · '+series.length+' 条曲线 · '+metricInfo[metric].label+(despike&&metric!=='loss'?' · 消峰':'');
      if(!rows.length){chartEl.innerHTML='<div class="empty">还没有选择节点。</div>';$('curveLegend').innerHTML='';return}
      if(loading&&!series.some(s=>s.records.length)){chartEl.innerHTML='<div class="empty">正在加载曲线样本...</div>';$('curveLegend').innerHTML='';return}
      const width=compact?Math.max(360,chartWidth):1160, height=compact?320:430, left=compact?64:64, right=compact?18:26, top=compact?24:28, bottom=compact?54:48;
      const allTimes=series.flatMap(s=>s.records.map(r=>r.time)).filter(Number.isFinite);
      const values=series.flatMap(s=>s.records.map(r=>r.value)).filter(value=>value!==null&&Number.isFinite(value));
      if(!allTimes.length||!values.length){chartEl.innerHTML='<div class="empty">当前节点在这个时间范围内没有可用曲线点。</div>';$('curveLegend').innerHTML='';return}
      let start=Math.min(...allTimes), end=Math.max(...allTimes);
      if(start===end){start-=60000;end+=60000}
      const span=Math.max(end-start,1), scale=renderScale(values), maxY=scale.maxY, metricLabel=metricInfo[metric].label;
      const xOf=t=>left+((t-start)/span)*(width-left-right), yOf=value=>top+(1-(value/maxY))*(height-top-bottom), plot=value=>scale.cap!==null?Math.min(value,scale.cap):value;
      let svg='<svg viewBox="0 0 '+width+' '+height+'" role="img" aria-label="'+escapeHTML(metricLabel)+' 曲线对比">';
      [0,.25,.5,.75,1].forEach(r=>{const value=maxY*r, y=yOf(value);svg+='<line class="axis" x1="'+left+'" y1="'+y.toFixed(1)+'" x2="'+(width-right)+'" y2="'+y.toFixed(1)+'"></line><text x="'+(compact?8:10)+'" y="'+(y+4).toFixed(1)+'" fill="#90a6b3" font-size="'+(compact?13:12)+'" font-family="monospace" font-weight="750">'+escapeHTML(fmtMetric(value))+'</text>'});
      if(scale.clipped){const capY=yOf(scale.cap);svg+='<line class="cap-line" x1="'+left+'" y1="'+capY.toFixed(1)+'" x2="'+(width-right)+'" y2="'+capY.toFixed(1)+'"></line><text text-anchor="end" x="'+(width-right-4)+'" y="'+Math.max(top+14,capY-6).toFixed(1)+'" fill="#f4c95d" font-size="12" font-family="monospace" font-weight="850">消峰 '+escapeHTML(fmtMetric(scale.cap))+'</text>'}
      const ticks=compact?3:5;
      for(let i=0;i<ticks;i++){const t=start+(span/(ticks-1))*i, x=xOf(t), anchor=i===ticks-1?'end':i===0?'start':'middle';svg+='<text text-anchor="'+anchor+'" x="'+x.toFixed(1)+'" y="'+(height-17)+'" fill="#90a6b3" font-size="'+(compact?12:11)+'" font-family="monospace" font-weight="750">'+escapeHTML(new Date(t).toLocaleTimeString())+'</text>'}
      const maxPoints=compact?42:72;
      series.forEach((s,i)=>{
        const color=palette[i%palette.length], records=downsample(s.records,maxPoints), points=records.map(r=>[xOf(r.time),yOf(plot(r.value)),r.value]);
        if(points.length>1)svg+='<path class="line" stroke="'+color+'" d="'+linePath(points)+'"></path>';
        else if(points.length===1)svg+='<circle class="point" cx="'+points[0][0].toFixed(1)+'" cy="'+points[0][1].toFixed(1)+'" r="4.5" fill="'+color+'"></circle>';
      });
      svg+='</svg>';
      chartEl.innerHTML=svg;
      const legendLimit=compact?36:80, extra=Math.max(0,series.length-legendLimit);
      $('curveLegend').innerHTML=series.slice(0,legendLimit).map((s,i)=>'<span class="legend-item"><span class="legend-dot" style="background:'+palette[i%palette.length]+'"></span>'+escapeHTML(s.label)+'</span>').join('')+(extra?'<span class="legend-item">+'+extra+' 条</span>':'');
    }
    document.querySelectorAll('[data-hours]').forEach(btn=>btn.addEventListener('click',()=>{hours=Number(btn.dataset.hours)||24;sampleCache.clear();selectionTouched=true;renderAll();loadSamplesForSelected(true).catch(e=>toast(e.message,true))}));
    document.querySelectorAll('[data-metric]').forEach(btn=>btn.addEventListener('click',()=>{metric=btn.dataset.metric||'rtt';renderAll()}));
    $('despikeBtn').addEventListener('click',()=>{despike=!despike;renderAll()});
    $('selectDefaultBtn').addEventListener('click',()=>{selectDefault(scopedRows());selectionTouched=true;renderAll();loadSamplesForSelected().catch(e=>toast(e.message,true))});
    $('selectAllBtn').addEventListener('click',()=>{selectedNodes.clear();scopedRows().forEach(row=>selectedNodes.add(row.node.id));selectionTouched=true;renderAll();loadSamplesForSelected().catch(e=>toast(e.message,true))});
    $('clearBtn').addEventListener('click',()=>{selectedNodes.clear();selectionTouched=true;renderAll()});
    $('searchInput').addEventListener('input',e=>{keyword=e.target.value;selectionTouched=false;renderAfterScopeChange()});
    $('reloadBtn').addEventListener('click',()=>{sampleCache.clear();load(true).catch(e=>toast(e.message,true))});
    load().catch(e=>toast(e.message,true));
    setInterval(()=>load(true).catch(console.error),30000);
  </script>
</body>
</html>
